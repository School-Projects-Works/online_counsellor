allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

// Some older plugins don't declare a namespace, which AGP 8+ requires.
// Fall back to the plugin's `group` (which matches its AndroidManifest package) when missing.
subprojects { project ->
    ["com.android.application", "com.android.library"].each { pluginId ->
        project.plugins.withId(pluginId) {
            project.extensions.configure("android") { ext ->
                if (ext.namespace == null) {
                    ext.namespace project.group.toString()
                }
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
