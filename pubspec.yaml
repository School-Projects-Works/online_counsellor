name: online_counsellor
description: Online Counselling section
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.9
  flutter_riverpod: ^3.3.2
  flutter_smart_dialog: ^5.1.0
  google_fonts: ^8.2.0
  firebase_auth: ^6.5.6
  firebase_core: ^4.12.1
  cloud_firestore: ^6.7.1
  firebase_storage: ^13.4.5
  image_picker: ^1.2.3
  carousel_slider: ^5.1.2
  intl: ^0.20.3
  google_nav_bar: ^5.0.7
  http: ^1.6.0
  badges: ^3.2.0
  record: ^7.1.1
  permission_handler: ^12.0.3
  path_provider: ^2.1.3
  just_audio: ^0.10.6
  simple_ripple_animation: ^0.1.0
  percent_indicator: ^4.2.3
  faker: ^2.1.0
  url_launcher: ^6.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.8


flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo/
    - assets/images/
# flutter_native_splash-development.yaml
flutter_native_splash:
  color: "#ffffff"
  color_dark: "#ffffff"
  image_dark: assets/logo/logo.png
  icon_background_color_dark: "#ffffff"
  image: assets/logo/logo.png
  android: true
  ios: true
  fullscreen: true
  android_12:
    image: assets/logo/logo_android_12.png
    icon_background_color: "#ffffff"
    image_dark: assets/logo/logo_android_12.png
    icon_background_color_dark: "#ffffff"
#dart run flutter_native_splash:create